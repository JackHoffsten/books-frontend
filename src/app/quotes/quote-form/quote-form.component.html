<div class="card shadow-sm p-4 mx-auto">
  <h1 class="h4 mb-3">{{ quoteId ? 'Redigera citat' : 'Lägg till citat' }}</h1>
  <form [formGroup]="quoteForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Citat</label>
      <input formControlName="text" class="form-control" placeholder="Citat" />
    </div>
    <div class="mb-3">
      <label class="form-label">Författare</label>
      <input formControlName="author" class="form-control" placeholder="Författare" />
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="isSaving">
        {{ quoteId ? 'Spara ändringar' : 'Lägg till citat' }}
      </button>
      <a class="btn btn-outline-secondary" routerLink="/quotes">Avbryt</a>
    </div>
  </form>
</div>
