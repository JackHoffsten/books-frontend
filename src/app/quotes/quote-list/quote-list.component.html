<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h1 class="h3 mb-1">Citat</h1>
    <p class="text-muted mb-0">Hantera din lista med citat.</p>
  </div>
  <a routerLink="/quotes/new" class="btn btn-primary">
    <i class="fa-solid fa-plus"></i>
    <span class="d-none d-sm-inline"> Lägg till nytt citat</span>
  </a>
</div>
@if ((quotes$ | async); as quotes) {
  @if (quotes.length > 0) {
    <div class="row g-4">
      @for (quote of quotes; track quote.id) {
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card h-100 shadow-sm hover-shadow" style="cursor: pointer;" (click)="editQuote(quote.id, $event)">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-start mb-3">
                <i class="fa-solid fa-quote-left text-primary fs-4"></i>
                <div class="btn-group btn-group-sm" (click)="$event.stopPropagation()">
                  <button 
                    class="btn btn-outline-secondary" 
                    title="Redigera"
                    (click)="editQuote(quote.id, $event)">
                    <i class="fa-solid fa-pen-to-square"></i>
                  </button>
                  <button 
                    class="btn btn-outline-danger" 
                    title="Ta bort"
                    (click)="deleteQuote(quote.id, $event)">
                    <i class="fa-solid fa-trash"></i>
                  </button>
                </div>
              </div>
              <p class="card-text fs-6 fst-italic mb-3">
                "{{ quote.text }}"
              </p>
              <p class="card-text text-muted mb-0 text-end">
                <i class="fa-solid fa-user me-2"></i>{{ quote.author }}
              </p>
            </div>
          </div>
        </div>
      }
    </div>
  } @else {
    <div class="text-center py-5">
      <i class="fa-solid fa-quote-right fa-3x text-muted mb-3"></i>
      <p class="text-muted mb-3">Inga citat hittades</p>
      <a routerLink="/quotes/new" class="btn btn-primary btn-sm">
        <i class="fa-solid fa-plus"></i> Skapa ditt första citat
      </a>
    </div>
  }
} @else {
  <div class="d-flex justify-content-center align-items-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Laddar citat...</span>
    </div>
  </div>
}
