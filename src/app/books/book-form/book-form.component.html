<div class="card shadow-sm p-4 mx-auto">
  <h1 class="h4 mb-3">{{ bookId ? 'Redigera bok' : 'Lägg till bok' }}</h1>
  <form [formGroup]="bookForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label">Titel</label>
      <input formControlName="title" class="form-control" placeholder="Boktitel" />
    </div>
    <div class="mb-3">
      <label class="form-label">Författare</label>
      <input formControlName="author" class="form-control" placeholder="Författare" />
    </div>
    <div class="mb-3">
      <label class="form-label">Publiceringsdatum</label>
      <input type="date" formControlName="publishedDate" class="form-control" />
    </div>
    <div class="mb-3">
      <label class="form-label">Beskrivning</label>
      <textarea formControlName="description" class="form-control" rows="4" placeholder="Kort beskrivning"></textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary" [disabled]="isSaving">
        {{ bookId ? 'Spara ändringar' : 'Lägg till bok' }}
      </button>
      <a class="btn btn-outline-secondary" routerLink="/books">Avbryt</a>
    </div>
  </form>
</div>
