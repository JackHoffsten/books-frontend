<div class="d-flex justify-content-between align-items-center mb-4">
  <div>
    <h1 class="h3">Böcker</h1>
    <p class="text-muted">Hantera din lista med böcker.</p>
  </div>
  <a routerLink="/books/new" class="btn btn-primary">Lägg till ny bok</a>
</div>
<div class="table-responsive">
  <table class="table table-hover align-middle">
    <thead class="table-light">
      <tr>
        <th>Titel</th>
        <th>Författare</th>
        <th>Beskrivning</th>
        <th>Publiceringsdatum</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (book of books$ | async; track book.id) {
        <tr (click)="goToBook(book.id)" style="cursor: pointer;">
          <td>{{ book.title }}</td>
          <td>{{ book.author }}</td>
          <td>{{ book.description }}</td>
          <td>{{ book.publishedDate | date:'longDate' }}</td>
          <td class="text-end">
            <button
              class="btn btn-sm btn-danger" 
              (click)="deleteBook(book.id, book.title, $event)"
            >
              <i class="fa-solid fa-trash"></i>
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
